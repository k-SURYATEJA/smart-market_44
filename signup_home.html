<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Smart Marketing</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: #111111;
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .authwrapper {
            display: flex;
            background: rgba(255, 215, 0, 0.05);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 800px;
            max-width: 90%;
            overflow: hidden; 
        }

        .authimage {
            flex: 1;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }
        
        .authimage img {
            max-width: 100%;
            border-radius: 8px; 
        }

        .authform { flex: 1; padding: 50px 40px; }
        .authform h2 { text-align: center; margin-bottom: 30px; font-size: 24px; }

        .inputgrp { margin-bottom: 20px; position: relative; }
        .inputgrp input {
            width: 100%; padding: 15px 20px 15px 45px;
            border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
        }
        .inputgrp input:focus { border-color: #FFD700; background: rgba(0,0,0,0.5); }


        .submitbtn {
            width: 100%; padding: 15px; border: none; border-radius: 8px; background: #FFD700;
        }

        .linksarea { text-align: center; margin-top: 20px; font-size: 13px; }
        .linksarea a:hover { color: #FFD700; }
        .switchlink { margin-top: 30px; font-weight: 600; font-size: 15px; }

      
    </style>
</head>
<body>

    <div class="authwrapper">
        <div class="authimage">
            <img src="download.jpg" alt="Sign Up Illustration">
        </div>

        <div class="authform">
            <h2>Create Account</h2>
            <form action="#">
                <div class="inputgrp">
                    <span class="inputicon">👤</span>
                    <input type="text" placeholder="First Name" required>
                </div>
                <div class="inputgrp">
                    <span class="inputicon">👤</span>
                    <input type="text" placeholder="Last Name" required>
                </div>
                <div class="inputgrp">
                    <span class="inputicon">✉</span>
                    <input type="email" placeholder="Email" required>
                </div>
                <div class="inputgrp">
                    <span class="inputicon">🔒</span>
                    <input type="password" placeholder="Password" required>
                </div>
                <div class="inputgrp">
                    <span class="inputicon">🔒</span>
                    <input type="password" placeholder=" confirm Password" required>
                </div>
                <button type="submit" class="submitbtn">SIGN UP</button>
                
                <div class="linksarea">
                    <a href="index.html" class="switchlink">⬅ Back to Home</a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
